# Default Configuration for Mini OS Kernel Simulator

# Scheduler: fcfs, rr, priority
scheduler = rr
time_quantum = 4
preemptive_priority = true

# Memory
total_physical_frames = 16
page_size = 4
replacement_policy = lru
max_pages_per_process = 8

# Workload
num_processes = 6
min_cpu_burst = 5
max_cpu_burst = 30
min_io_burst = 2
max_io_burst = 10
min_memory_pages = 2
max_memory_pages = 8
arrival_spread = 3

# Logging
console_logging = true
file_logging = true
log_dir = output/logs

# Simulation
random_seed = 42
